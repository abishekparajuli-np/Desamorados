version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: sewasathi_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sewasathi123}
      POSTGRES_DB: sewasathi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sewasathi_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sewasathi_backend
    environment:
      FLASK_APP: run.py
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:sewasathi123@postgres:5432/sewasathi}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-secret-key-change-this}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    networks:
      - sewasathi_network
    command: python run.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sewasathi_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - sewasathi_network
    command: npm run dev

volumes:
  postgres_data:
  uploads_data:

networks:
  sewasathi_network:
    driver: bridge
